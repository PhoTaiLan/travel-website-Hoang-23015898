<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TRAVEL WEBSITE - Trang chủ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <h1>TRAVEL WEBSITE</h1>
    </header>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="tour.html">Tour</a></li>
            <li><a href="booking.html">Đặt tour</a></li>
        </ul>
    </nav>

    <section class="banner">
        <img src="https://img.freepik.com/premium-vector/vietnam-flag-map-national-day-independence-day-design-vietnamese-celebration-modern-retro-banner-design-vector-illustration_180969-749.jpg" alt="Banner Việt Nam">
        <div class="banner-content">
            <h2>KHÁM PHÁ VIỆT NAM</h2>
            <a href="tour.html" class="btn">Xem tour</a>
        </div>
    </section>

    <main class="container">
        <h3>Tour nổi bật</h3>
        <div class="tour-grid">
            <div class="tour-card">
                <img src="https://nhandan.vn/special/30-nam-mot-chang-duong-di-san-Vinh-Ha-Long/assets/HLCklusX0n/things-to-do-in-ha-long-bay-banner-1-1920x1080.jpg" alt="Tour 1">
                <h4>Hạ Long Kỳ Thú</h4>
                <p>Khám phá vẻ đẹp di sản thiên nhiên thế giới.</p>
                <button class="btn">Xem chi tiết</button>
            </div>
            <div class="tour-card">
                <img src="https://booking.muongthanh.com/upload_images/images/Nhung/review-dia-diem-du-lich-sapa.jpg" alt="Tour 2">
                <h4>Sapa Mờ Sương</h4>
                <p>Trải nghiệm văn hóa vùng cao độc đáo.</p>
                <button class="btn">Xem chi tiết</button>
            </div>
            <div class="tour-card">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYlQPUoqstff2bdt5ldO_FLBiwqDUI9VX6kg&s" alt="Tour 3">
                <h4>Đà Nẵng Biển Gọi</h4>
                <p>Thành phố của những cây cầu và bãi biển đẹp.</p>
                <button class="btn">Xem chi tiết</button>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
